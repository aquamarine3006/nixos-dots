$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, W, killactive
bind = $mod SHIFT, W, exit
bind = $mod, T, togglefloating
bind = $mod, F, fullscreen
bind = $mod, P, pseudo
bind = $mod, J, layoutmsg, togglesplit
bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

bind = $mod, B, exec, nautilus --new-window
bind = $mod, U, exec, firefox
bind = $mod, period, exec, kitty --class impala -e impala

bind = $mod, Space, exec, qs ipc call pill launcher
bind = $mod, Q, exec, qs ipc call pill wallpaper
bind = $mod, T, exec, qs ipc call pill theme
bind = $mod, Escape, exec, qs ipc call pill power
bind = $mod, S, exec, qs ipc call pill sysmon
bind = $mod, N, exec, qs ipc call pill notifications
bind = $mod, C, exec, qs ipc call pill clipboard
bind = $mod, A, exec, qs ipc call pill mixer
bind = $mod, M, exec, qs ipc call pill media
bind = $mod, K, exec, qs ipc call pill calendar
bind = $mod, I, exec, qs ipc call pill network
bind = $mod SHIFT, L, exec, qs ipc call lock lock

bind = , Print, exec, ~/scripts/screenshot.sh region
bind = $mod, Print, exec, ~/scripts/screenshot.sh full
bind = SHIFT, Print, exec, ~/scripts/screenshot.sh window

binde = , XF86AudioRaiseVolume, exec, pamixer -i 5 && qs ipc call pill osd volume
binde = , XF86AudioLowerVolume, exec, pamixer -d 5 && qs ipc call pill osd volume
bind = , XF86AudioMute, exec, pamixer -t && qs ipc call pill osd mute
bind = , XF86AudioMicMute, exec, pamixer --default-source -t

binde = , XF86MonBrightnessUp, exec, brightnessctl set +5% && qs ipc call pill osd brightness
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && qs ipc call pill osd brightness

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Dynamic Island Keybinds — see island section below




# ── Quickshell Island Panels ────────────────────────────────
bind = $mod, Space,      exec, qs ipc call island launcher
bind = $mod, Q,          exec, qs ipc call island wallpaper
bind = $mod, Escape,     exec, qs ipc call island power
bind = $mod, A,          exec, qs ipc call island controlcenter
bind = $mod ALT, M,      exec, qs ipc call island mixer
bind = $mod, M,          exec, qs ipc call island media
bind = $mod, L,          exec, qs ipc call island lockscreen
bind = $mod, V,          exec, qs ipc call island visualizer
bind = $mod, P,          exec, qs ipc call island powerprofile
bind = $mod, S,          exec, qs ipc call island scriptlauncher
bind = $mod, I,          exec, qs ipc call island sysinfo
bind = $mod ALT, Escape, exec, qs ipc call island close

# ── OSD (Volume / Brightness) ───────────────────────────────
binde = CTRL ALT, Up,    exec, pamixer -i 5 && qs ipc call island volUp
binde = CTRL ALT, Down,  exec, pamixer -d 5 && qs ipc call island volDown
binde = CTRL ALT, Right, exec, brightnessctl set +5% && qs ipc call island briUp
binde = CTRL ALT, Left,  exec, brightnessctl set 5%- && qs ipc call island briDown

# ── Media ────────────────────────────────────────────────────
bind = $mod ALT, P, exec, qs ipc call island mediaToggle
bind = $mod ALT, N, exec, qs ipc call island mediaNext
bind = $mod ALT, B, exec, qs ipc call island mediaPrev
